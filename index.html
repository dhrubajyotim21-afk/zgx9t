    <style>
        /* Strict No Copy & No Selection */
        * {

            -moz-user-select: none !important;

            user-select: none !important;
            -webkit-touch-callout: none !important;

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        .timeline-container {
            position: relative;
            width: 100%;
            height: 5px;
            background: #27272a;
            border-radius: 9999px;
            cursor: pointer;
            display: flex;
            align-items: center;
        }
        
        .timeline-progress {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            background: linear-gradient(90deg, #facc15, #ffffff);
            border-radius: 9999px;
            width: 0%;
        }

        .timeline-thumb {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #ffffff;
            border: 2px solid #facc15;
            border-radius: 50%;
            left: 0%;
            transform: translateX(-50%);
            pointer-events: none;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Captures clicks safely so YouTube interaction is disabled */
        .yt-overlay-blocker {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            background: transparent;
        }

        /* Split zones for Double Tap to Seek in Fullscreen */
        .seek-zone {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 50%;
            z-index: 25;
            background: transparent;
        }
        .seek-left { left: 0; }
        .seek-right { right: 0; }

        /* Audio Visualizer Light Flickering Slide */
        @keyframes flicker {
            0%, 100% { opacity: 0.3; background-color: #ef4444; boxShadow: 0 0 4px #ef4444; }
            50% { opacity: 1; background-color: #facc15; boxShadow: 0 0 12px #facc15; }
        }
        .flicker-bar-active {
            animation: flicker 0.6s infinite alternate;
        }
    </style>

    <script>
        // --- FIREBASE CONFIGURATION ---
        const firebaseConfig = { 
            apiKey: "AIzaSyDISW7EbMP_eEt4GuR6cijgMyYKxgb7xIg", 
            authDomain: "music-b05e1.firebaseapp.com", 
            databaseURL: "https://music-b05e1-default-rtdb.firebaseio.com", 
            projectId: "music-b05e1", 
            storageBucket: "music-b05e1.firebasestorage.app", 
            messagingSenderId: "771714302354", 
            appId: "1:771714302354:web:43b3f590e1ff70a851014b" 
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const database = firebase.database();

        let allSongs = [];
        let filteredSongs = [];
        let currentSongIndex = -1;
        let ytPlayer = null;
        let timelineInterval = null;
        let isDraggingTimeline = false;
        let isPlayerFullscreen = false;
        
        let lastLeftTap = 0;
        let lastRightTap = 0;

        function getYoutubeId(url) {
            if (!url) return '';
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : '';
        }

        function extractSongs(obj) {
            let songsList = [];
            function recurse(current) {
                if (!current || typeof current !== 'object') return;
                if (current.url || current.videoUrl || current.link || current.songUrl) {
                    songsList.push({
                        title: current.title || current.name || current.songName || 'Untitled Song',
                        url: current.url || current.videoUrl || current.link || current.songUrl
                    });
                    return;
                }
                Object.keys(current).forEach(key => recurse(current[key]));
            }
            recurse(obj);
            return songsList;
        }

        function loadSongsFromDatabase() {
            database.ref('/').on('value', (snapshot) => {
                const data = snapshot.val();
                allSongs = extractSongs(data);
                if(allSongs.length === 0) {
                    allSongs = [{ title: "Sample Song", url: "https://www.youtube.com/watch?v=dQw4w9WgXcQ" }];
                }
                filteredSongs = [...allSongs];
                document.getElementById('totalSongsCount').innerText = `${allSongs.length} Songs`;
                renderSongsList();
                renderXTSongsList();
                
                // Recover Session state after data fetch completes
                recoverSavedSession();
            });
        }

        function renderSongsList() {
            const container = document.getElementById('songsContainer');
            container.innerHTML = '';
            filteredSongs.forEach((song, index) => {
                const ytId = getYoutubeId(song.url);
                const thumbUrl = ytId ? `https://img.youtube.com/vi/${ytId}/mqdefault.jpg` : '';

                const card = document.createElement('div');
                card.className = "bg-zinc-900/60 hover:bg-zinc-800 border border-zinc-900 rounded-lg p-2 flex items-center gap-3 cursor-pointer transition-all active:scale-[0.99] group min-w-0";
                card.onclick = () => playSong(allSongs.indexOf(song));

                card.innerHTML = `
                    <div class="w-20 h-12 bg-black rounded overflow-hidden shrink-0 border border-zinc-800 relative">
                        <img src="${thumbUrl}" alt="thumbnail" class="w-full h-full object-cover">
                    </div>
                    <div class="min-w-0 flex-1">
                        <h3 class="text-sm font-bold text-zinc-100 group-hover:text-yellow-400 break-words whitespace-normal line-clamp-2">${song.title}</h3>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // XT option with full size visual thumbnails
        function renderXTSongsList() {
            const xtContainer = document.getElementById('xtSongsList');
            xtContainer.innerHTML = '';
            allSongs.forEach((song, index) => {
                const ytId = getYoutubeId(song.url);
                const thumbUrl = ytId ? `https://img.youtube.com/vi/${ytId}/mqdefault.jpg` : '';

                const card = document.createElement('div');
                card.className = "bg-zinc-900 hover:bg-zinc-800 rounded overflow-hidden flex flex-col cursor-pointer transition-all border border-zinc-800 group";
                card.onclick = () => { 
                    playSong(index); 
                    toggleXTPanel(); 
                };
                card.innerHTML = `
                    <div class="w-full aspect-video bg-black border-b border-zinc-800">
                        <img src="${thumbUrl}" alt="thumbnail" class="w-full h-full object-cover">
                    </div>
                    <div class="p-2">
                        <p class="text-xs font-bold text-zinc-200 group-hover:text-yellow-400 line-clamp-2">${song.title}</p>
                    </div>
                `;
                xtContainer.appendChild(card);
            });
        }

        function playSong(index, startAtSeconds = 0) {
            if (index < 0 || index >= allSongs.length) return;
            currentSongIndex = index;
            const song = allSongs[index];
            const ytId = getYoutubeId(song.url);

            if(!ytId) return alert("Invalid YouTube URL!");

            document.getElementById('fullPlayerTitle').innerText = song.title;
            document.getElementById('miniPlayerTitle').innerText = song.title;
            
            document.getElementById('miniPlayer').classList.remove('hidden');
            document.getElementById('miniPlayer').classList.add('flex');

            const p = document.getElementById('ytPlayerContainer');
            if (isPlayerFullscreen) {
                document.getElementById('fullVideoWrapper').appendChild(p);
            } else {
                document.getElementById('miniVideoWrapper').appendChild(p);
            }

            // Save persistent state details
            localStorage.setItem('zg_last_index', currentSongIndex);

            if (!ytPlayer) {
                ytPlayer = new YT.Player('ytPlayerContainer', {
                    height: '100%',
                    width: '100%',
                    videoId: ytId,
                    playerVars: { 'controls': 0, 'disablekb': 1, 'rel': 0, 'modestbranding': 1, 'iv_load_policy': 3, 'fs': 0, 'playsinline': 1, 'start': startAtSeconds },
                    events: {
                        'onReady': (e) => { 
                            if(startAtSeconds > 0) e.target.seekTo(startAtSeconds, true);
                            e.target.playVideo(); 
                            startTimelineSync(); 
                        },
                        'onStateChange': onPlayerStateChange
                    }
                });
            } else {
                ytPlayer.loadVideoById({ videoId: ytId, startSeconds: startAtSeconds || 0 });
            }
        }

        function onPlayerStateChange(event) {
            const fIcon = document.getElementById('fullPlayIcon');
            const mIcon = document.getElementById('miniPlayIcon');
            const lightBar = document.getElementById('visualizerLightBar');

            if (event.data == YT.PlayerState.PLAYING) {
                fIcon.className = "fas fa-pause";
                mIcon.className = "fas fa-pause";
                lightBar.classList.add('flicker-bar-active');
                startTimelineSync();
            } else {
                fIcon.className = "fas fa-play pl-1";
                mIcon.className = "fas fa-play pl-0.5";
                lightBar.classList.remove('flicker-bar-active');
                clearInterval(timelineInterval);
            }
            if (event.data == YT.PlayerState.ENDED) playNext();
        }

        function startTimelineSync() {
            clearInterval(timelineInterval);
            timelineInterval = setInterval(() => {
                if (ytPlayer && ytPlayer.getCurrentTime && !isDraggingTimeline) {
                    const current = ytPlayer.getCurrentTime();
                    const duration = ytPlayer.getDuration() || 0;
                    const pct = duration > 0 ? (current / duration) * 100 : 0;
                    
                    document.getElementById('fullTimelineProgress').style.width = `${pct}%`;
                    document.getElementById('fullTimelineThumb').style.left = `${pct}%`;
                    
                    document.getElementById('miniTimelineProgress').style.width = `${pct}%`;
                    document.getElementById('miniTimelineThumb').style.left = `${pct}%`;

                    document.getElementById('currentTimeLabel').innerText = formatTime(current);
                    document.getElementById('totalTimeLabel').innerText = formatTime(duration);

                    // Continuous update state for structural safe refresh recovery
                    localStorage.setItem('zg_last_time', current);
                }
            }, 250);
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }

        // --- DOUBLE TAP SEEK LOGIC ---
        function handleLeftSeek(e) {
            e.stopPropagation();
            let now = new Date().getTime();
            if (now - lastLeftTap < 300) {
                if (ytPlayer && ytPlayer.getCurrentTime) {
                    let target = Math.max(0, ytPlayer.getCurrentTime() - 5);
                    ytPlayer.seekTo(target, true);
                }
            }
            lastLeftTap = now;
        }

        function handleRightSeek(e) {
            e.stopPropagation();
            let now = new Date().getTime();
            if (now - lastRightTap < 300) {
                if (ytPlayer && ytPlayer.getCurrentTime) {
                    let target = Math.min(ytPlayer.getDuration() || 0, ytPlayer.getCurrentTime() + 5);
                    ytPlayer.seekTo(target, true);
                }
            }
            lastRightTap = now;
        }

        // --- INTERACTION FOR BOTH TIMELINES ---
        function attachTimelineEvents(containerId, progressId, thumbId) {
            const container = document.getElementById(containerId);
            function handleInteraction(e) {
                if (!ytPlayer || !ytPlayer.getDuration) return;
                const rect = container.getBoundingClientRect();
                let clickX = (e.clientX || e.touches[0].clientX) - rect.left;
                clickX = Math.max(0, Math.min(clickX, rect.width));
                const pct = clickX / rect.width;
                const targetTime = pct * (ytPlayer.getDuration() || 0);

                document.getElementById(progressId).style.width = `${pct * 100}%`;
                document.getElementById(thumbId).style.left = `${pct * 100}%`;
                return targetTime;
            }
            container.addEventListener('mousedown', (e) => {
                isDraggingTimeline = true;
                let t = handleInteraction(e);
                function move(me) { t = handleInteraction(me); }
                function up() { isDraggingTimeline = false; ytPlayer.seekTo(t, true); window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); }
                window.addEventListener('mousemove', move); window.addEventListener('mouseup', up);
            });
            container.addEventListener('touchstart', (e) => {
                isDraggingTimeline = true;
                let t = handleInteraction(e);
                function move(me) { t = handleInteraction(me); }
                function up() { isDraggingTimeline = false; ytPlayer.seekTo(t, true); window.removeEventListener('touchmove', move); window.removeEventListener('touchend', up); }
                window.addEventListener('touchmove', move); window.addEventListener('touchend', up);
            });
        }
        attachTimelineEvents('fullTimeline', 'fullTimelineProgress', 'fullTimelineThumb');
        attachTimelineEvents('miniTimeline', 'miniTimelineProgress', 'miniTimelineThumb');

        // --- LAYER MANAGERS WITH INSTANT SYNC ---
        function openFullScreenPlayer() {
            isPlayerFullscreen = true;
            document.getElementById('fullScreenPlayer').classList.remove('hidden');
            document.getElementById('fullScreenPlayer').classList.add('flex');
            
            const p = document.getElementById('ytPlayerContainer');
            document.getElementById('fullVideoWrapper').appendChild(p);
        }

        function closeFullScreenPlayer() {
            isPlayerFullscreen = false;
            document.getElementById('fullScreenPlayer').classList.add('hidden');
            document.getElementById('fullScreenPlayer').classList.remove('flex');
            
            const p = document.getElementById('ytPlayerContainer');
            document.getElementById('miniVideoWrapper').appendChild(p);
        }

        function togglePlayPause() {
            if(!ytPlayer) return;
            ytPlayer.getPlayerState() == YT.PlayerState.PLAYING ? ytPlayer.pauseVideo() : ytPlayer.playVideo();
        }

        function playNext() { if(currentSongIndex < allSongs.length - 1) playSong(currentSongIndex + 1); else playSong(0); }
        function playPrevious() { if(currentSongIndex > 0) playSong(currentSongIndex - 1); else playSong(allSongs.length - 1); }

        function closeVideo() {
            if(ytPlayer) ytPlayer.stopVideo();
            clearInterval(timelineInterval);
            document.getElementById('miniPlayer').classList.add('hidden');
            document.getElementById('fullScreenPlayer').classList.add('hidden');
            isPlayerFullscreen = false;
            localStorage.removeItem('zg_last_index');
            localStorage.removeItem('zg_last_time');
        }

        // --- SESSION RECOVERY ENGINE ---
        function recoverSavedSession() {
            const savedIndex = localStorage.getItem('zg_last_index');
            const savedTime = localStorage.getItem('zg_last_time');
            if (savedIndex !== null) {
                const index = parseInt(savedIndex);
                const startSecs = savedTime ? parseFloat(savedTime) : 0;
                if(index >= 0 && index < allSongs.length) {
                    playSong(index, startSecs);
                }
            }
        }

        // Block Refresh in Fullscreen Mode
        window.addEventListener('beforeunload', (e) => {
            if (isPlayerFullscreen) {
                e.preventDefault();
                e.returnValue = 'Player is in Fullscreen mode.';
                return 'Player is in Fullscreen mode.';
            }
        });

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            filteredSongs = query === '' ? [...allSongs] : allSongs.filter(s => s.title.toLowerCase().includes(query));
            renderSongsList();
        });

        function toggleXTPanel() {
            const p = document.getElementById('xtPanel');
            p.classList.toggle('hidden');
            p.classList.toggle('translate-x-full');
        }

        // Deep Anti-Copy Shortcut Blocker
        window.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && (e.key === 'c' || e.key === 'a' || e.key === 'u' || e.key === 's')) {
                e.preventDefault();
                return false;
            }
        });

        window.onload = loadSongsFromDatabase;
    </script>
</body>
</html>
